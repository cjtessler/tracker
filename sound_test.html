<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sound Tester</title>
  <style>
    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: monospace;
      max-width: 480px;
      margin: 40px auto;
      padding: 20px;
    }
    h1 { color: #6367FF; margin-bottom: 4px; font-size: 1.4em; }
    p.subtitle { color: #888; margin-top: 0; font-size: 0.85em; }
    .group { margin: 18px 0; }
    label { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 0.9em; }
    label span { color: #6367FF; font-weight: bold; min-width: 60px; text-align: right; }
    input[type=range] { width: 100%; accent-color: #6367FF; }
    select {
      width: 100%;
      background: #2a2a3e;
      color: #e0e0e0;
      border: 1px solid #6367FF;
      padding: 6px;
      font-family: monospace;
      font-size: 0.9em;
    }
    .presets { display: flex; gap: 8px; margin: 20px 0; }
    button {
      flex: 1;
      padding: 10px 6px;
      background: #2a2a3e;
      color: #e0e0e0;
      border: 1px solid #444;
      cursor: pointer;
      font-family: monospace;
      font-size: 0.8em;
      border-radius: 4px;
    }
    button:hover { border-color: #6367FF; color: #6367FF; }
    #playBtn {
      width: 100%;
      padding: 16px;
      background: #6367FF;
      color: white;
      border: none;
      font-size: 1.1em;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 10px;
    }
    #playBtn:hover { background: #7a7eff; }
    #playBtn:active { background: #4a4ecc; }
    .code-block {
      background: #111;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 12px;
      margin-top: 20px;
      font-size: 0.8em;
      color: #aaa;
    }
    .code-block code { color: #6367FF; }
  </style>
</head>
<body>
  <h1>Sound Tester</h1>
  <p class="subtitle">Tune the press beep. Copy the call() into app.js when done.</p>

  <div class="presets">
    <button onclick="applyPreset('current')">Current</button>
    <button onclick="applyPreset('soft')">Soft Click</button>
    <button onclick="applyPreset('chime')">Gentle Chime</button>
    <button onclick="applyPreset('pop')">Soft Pop</button>
  </div>

  <div class="group">
    <label>Frequency (Hz) <span id="freqVal">600</span></label>
    <input type="range" id="freq" min="200" max="1200" step="10" value="600" oninput="update()">
  </div>
  <div class="group">
    <label>Duration (s) <span id="durVal">0.05</span></label>
    <input type="range" id="dur" min="0.02" max="0.5" step="0.01" value="0.05" oninput="update()">
  </div>
  <div class="group">
    <label>Attack (s) <span id="atkVal">0.00</span></label>
    <input type="range" id="atk" min="0" max="0.05" step="0.002" value="0" oninput="update()">
  </div>
  <div class="group">
    <label>Peak Gain <span id="gainVal">0.50</span></label>
    <input type="range" id="gain" min="0.05" max="1.0" step="0.01" value="0.5" oninput="update()">
  </div>
  <div class="group">
    <label>Waveform</label>
    <select id="wave" onchange="update()">
      <option value="sine">sine</option>
      <option value="triangle">triangle</option>
      <option value="square">square</option>
    </select>
  </div>

  <button id="playBtn" onclick="play()">Play</button>

  <div class="code-block">
    Copy into <code>playPressClick()</code> in app.js:<br><br>
    <span id="codeOut">SoundPlayer.playTone(600, 0.05, 0, 0, 0.5);</span>
  </div>

  <script>
    let audioCtx = null;

    function getCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }

    function playTone(freq, duration, startDelay, attack, peakGain, waveType) {
      const ctx = getCtx();
      if (ctx.state !== 'running') return;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = waveType;
      const t = ctx.currentTime + startDelay;
      if (attack > 0) {
        gain.gain.setValueAtTime(0.0001, t);
        gain.gain.linearRampToValueAtTime(peakGain, t + attack);
      } else {
        gain.gain.setValueAtTime(peakGain, t);
      }
      gain.gain.exponentialRampToValueAtTime(0.01, t + duration);
      osc.start(t);
      osc.stop(t + duration + 0.01);
    }

    function vals() {
      return {
        freq: parseFloat(document.getElementById('freq').value),
        dur:  parseFloat(document.getElementById('dur').value),
        atk:  parseFloat(document.getElementById('atk').value),
        gain: parseFloat(document.getElementById('gain').value),
        wave: document.getElementById('wave').value,
      };
    }

    function update() {
      const v = vals();
      document.getElementById('freqVal').textContent = v.freq;
      document.getElementById('durVal').textContent  = v.dur.toFixed(2);
      document.getElementById('atkVal').textContent  = v.atk.toFixed(3);
      document.getElementById('gainVal').textContent = v.gain.toFixed(2);
      document.getElementById('codeOut').textContent =
        `SoundPlayer.playTone(${v.freq}, ${v.dur.toFixed(2)}, 0, ${v.atk.toFixed(3)}, ${v.gain.toFixed(2)});`;
    }

    function play() {
      const v = vals();
      playTone(v.freq, v.dur, 0, v.atk, v.gain, v.wave);
    }

    function setSliders(freq, dur, atk, gain, wave) {
      document.getElementById('freq').value = freq;
      document.getElementById('dur').value  = dur;
      document.getElementById('atk').value  = atk;
      document.getElementById('gain').value = gain;
      document.getElementById('wave').value = wave;
      update();
    }

    const presets = {
      current: [600,  0.05, 0,     0.50, 'sine'],
      soft:    [520,  0.12, 0.010, 0.25, 'sine'],
      chime:   [440,  0.18, 0.015, 0.20, 'triangle'],
      pop:     [380,  0.10, 0.008, 0.18, 'sine'],
    };

    function applyPreset(name) {
      setSliders(...presets[name]);
      play();
    }

    update();
  </script>
</body>
</html>
